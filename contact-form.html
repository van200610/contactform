<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maghirang Contact Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">

<div class="container p-4 bg-white shadow rounded">
    <h2 class="mb-4 text-dark">Contact Form</h2>

    <form>
        <div class="row mb-3">
            
            <div class="col-md-6 mb-3">
                <label class="form-label" for="fullName">Full Name</label>
                <input type="text" class="form-control form-control-lg" id="fullName"
                       placeholder="ex. Juan Dela Cruz" aria-label="Full Name input field">
            </div>

           
            <div class="col-md-6 mb-3">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" class="form-control form-control-lg" id="email"
                       placeholder="ex. juandelacruz@ue.edu.ph" aria-label="Email Address input field">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label" for="message">Message</label>
            <textarea class="form-control" id="message" rows="4" placeholder="Input text here"
                      aria-label="Message textarea"></textarea>
        </div>
 
        <div class="mb-3">
            <label class="form-label d-block">Preferred Contact Method</label>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="email">
                <label class="form-check-label" for="email">Email</label>
            </div>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="phone">
                <label class="form-check-label" for="phone">Phone</label>
            </div>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="whatsapp">
                <label class="form-check-label" for="whatsapp">WhatsApp</label>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label" for="color">Favorite Color</label>
            <input type="color" class="form-control form-control-color" id="color"
                   aria-label="Favorite color picker">
        </div>

        <div class="mb-3">
            <label class="form-label" for="userId">User ID</label>
            <input type="text" id="userId" class="form-control" value="123456"
                   disabled aria-label="User ID disabled field">
        </div>

        <div class="mb-3">
            <label class="form-label" for="accountType">Account Type</label>
            <input type="text" id="accountType" class="form-control" value="Student"
                   readonly aria-label="Read-only account type">
        </div>
    
        <button type="submit" class="btn btn-success w-125">Submit</button>

    </form>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
